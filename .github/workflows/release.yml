name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.14.0)'
        required: false
        type: string
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install mingw-w64 and ARM cross-compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64 gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf gcc-i686-linux-gnu || true
          # Verify
          which aarch64-linux-gnu-gcc || echo "aarch64-linux-gnu-gcc not found"
          which arm-linux-gnueabihf-gcc || echo "arm-linux-gnueabihf-gcc not found"
          which i686-linux-gnu-gcc || echo "i686-linux-gnu-gcc not found"

      - name: Setup osxcross for macOS builds
        run: |
          # Install jq for JSON parsing
          sudo apt-get install -y jq

          # Use pre-built osxcross from kiper292
          URL=$(curl -sSL https://api.github.com/repos/kiper292/osxcross-prebuilt/releases/latest | jq -r '.assets[] | select(.name | endswith(".tar.gz")) | .browser_download_url')
          curl -sL "$URL" -o osxcross-target.tar.gz
          tar -xzf osxcross-target.tar.gz -C $HOME
          echo "$HOME/osxcross/target/bin" >> $GITHUB_PATH

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if ! echo "$VERSION" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: Version must match format v*.*.*"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VER=$(echo $VERSION | sed 's/v//')" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: prev_tag
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG="${{ steps.prev_tag.outputs.PREV_TAG }}"
          VERSION="${{ steps.version.outputs.VERSION }}"
          
          if [ -z "$PREV_TAG" ]; then
            LOG_RANGE="HEAD"
          else
            LOG_RANGE="$PREV_TAG..HEAD"
          fi
          
          CHANGED=""
          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            MSG=$(echo "$line" | sed 's/^[^ ]* //')
            AUTHOR=$(git log --format="%an" -1 "$HASH" 2>/dev/null || echo "unknown")
            
            PR_NUM=""
            for ref in $(git log --format="%D" -n 1 "$HASH" 2>/dev/null | tr ',' '\n'); do
              if echo "$ref" | grep -qE 'pull-request|#'; then
                PR_NUM=$(echo "$ref" | grep -oE '[[:digit:]]+' | head -1)
                break
              fi
            done
            
            if [ -n "$PR_NUM" ]; then
              CHANGED="$CHANGED- $MSG by [@$AUTHOR](https://github.com/$AUTHOR) in [#$PR_NUM](https://github.com/bogdanfinn/tls-client/pull/$PR_NUM)\n"
            else
              CHANGED="$CHANGED- $MSG by [@$AUTHOR](https://github.com/$AUTHOR)\n"
            fi
          done < <(git log --format="%H %s" --no-merges "$LOG_RANGE" 2>/dev/null | head -20)
          
          BODY="## What's Changed\n\n$CHANGED"
          
          BODY="$BODY\n\n## New Contributors\n\n"
          while IFS= read -r author; do
            if [ -n "$author" ]; then
              BODY="$BODY- [@$author](https://github.com/$author) made their first contribution\n"
            fi
          done < <(git log --format="%an" --no-merges "$LOG_RANGE" 2>/dev/null | sort | uniq | head -10)
          
          if [ -n "$PREV_TAG" ]; then
            BODY="$BODY\n**Full Changelog**: [${PREV_TAG}...${VERSION}](https://github.com/bogdanfinn/tls-client/compare/${PREV_TAG}...${VERSION})"
          fi
          
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Build Linux Ubuntu amd64 (via Docker)
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          docker build -f cffi_dist/Dockerfile.ubuntu.compile -t tls-client-ubuntu .
          docker run -e VERSION=$VERSION -v "$PWD":/tls-client tls-client-ubuntu bash -c "cd /tls-client/cffi_dist && GOOS=linux GOARCH=amd64 CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o /tls-client/cffi_dist/tls-client-linux-ubuntu-amd64-$VERSION.so"
          tar -czvf tls-client-linux-ubuntu-amd64-$VERSION.so.tar.gz cffi_dist/tls-client-linux-ubuntu-amd64-$VERSION.so

      - name: Build Linux Alpine amd64 (via Docker)
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          docker build -f cffi_dist/Dockerfile.alpine.compile -t tls-client-alpine .
          docker run -e VERSION=$VERSION -v "$PWD":/tls-client tls-client-alpine bash -c "cd /tls-client/cffi_dist && GOOS=linux GOARCH=amd64 CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o /tls-client/cffi_dist/tls-client-linux-alpine-amd64-$VERSION.so"
          tar -czvf tls-client-linux-alpine-amd64-$VERSION.so.tar.gz cffi_dist/tls-client-linux-alpine-amd64-$VERSION.so

      - name: Build Linux ARM64 (cross-compiler)
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          cd cffi_dist && GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-linux-arm64-$VERSION.so .
          cd .. && tar -czvf tls-client-linux-arm64-$VERSION.so.tar.gz tls-client-linux-arm64-$VERSION.so

      - name: Build Linux ARMv7 (cross-compiler)
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          cd cffi_dist && GOOS=linux GOARCH=arm CC=arm-linux-gnueabihf-gcc GOARM=7 CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-linux-armv7-$VERSION.so .
          cd .. && tar -czvf tls-client-linux-armv7-$VERSION.so.tar.gz tls-client-linux-armv7-$VERSION.so

      - name: Build macOS amd64 (via osxcross)
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          cd cffi_dist && GOOS=darwin GOARCH=amd64 CC=o64-clang CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-darwin-amd64-$VERSION.dylib .
          cd .. && tar -czvf tls-client-darwin-amd64-$VERSION.dylib.tar.gz tls-client-darwin-amd64-$VERSION.dylib

      - name: Build macOS arm64 (via osxcross)
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          cd cffi_dist && GOOS=darwin GOARCH=arm64 CC=oa64-clang CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-darwin-arm64-$VERSION.dylib .
          cd .. && tar -czvf tls-client-darwin-arm64-$VERSION.dylib.tar.gz tls-client-darwin-arm64-$VERSION.dylib

      - name: Build Windows (cross-compiler)
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          cd cffi_dist && GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-windows-64-$VERSION.dll .
          cd .. && tar -czvf tls-client-windows-64-$VERSION.dll.tar.gz tls-client-windows-64-$VERSION.dll
          
          cd cffi_dist && GOOS=windows GOARCH=386 CC=i686-w64-mingw32-gcc CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-windows-32-$VERSION.dll .
          cd .. && tar -czvf tls-client-windows-32-$VERSION.dll.tar.gz tls-client-windows-32-$VERSION.dll

      - name: Build xgo extra platforms
        env:
          VERSION: ${{ steps.version.outputs.VER }}
        run: |
          # Linux 386 (cross-compiler)
          cd cffi_dist && GOOS=linux GOARCH=386 CC=i686-linux-gnu-gcc CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-linux-386.so .
          cd .. && tar -czvf tls-client-xgo-$VERSION-linux-386.so.tar.gz tls-client-xgo-$VERSION-linux-386.so
          
          # Linux ARM64 (cross-compiler)
          cd cffi_dist && GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-linux-arm64.so .
          cd .. && tar -czvf tls-client-xgo-$VERSION-linux-arm64.so.tar.gz tls-client-xgo-$VERSION-linux-arm64.so
          
          # Linux ARMv6 (cross-compiler)
          cd cffi_dist && GOOS=linux GOARCH=arm CC=arm-linux-gnueabihf-gcc GOARM=6 CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-linux-arm-6.so .
          cd .. && tar -czvf tls-client-xgo-$VERSION-linux-arm-6.so.tar.gz tls-client-xgo-$VERSION-linux-arm-6.so
          
          # Linux ARMv7 (cross-compiler)
          cd cffi_dist && GOOS=linux GOARCH=arm CC=arm-linux-gnueabihf-gcc GOARM=7 CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-linux-arm-7.so .
          cd .. && tar -czvf tls-client-xgo-$VERSION-linux-arm-7.so.tar.gz tls-client-xgo-$VERSION-linux-arm-7.so
          
          # Linux s390x, ppc64le, riscv64 (native)
          cd cffi_dist && GOOS=linux GOARCH=s390x CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-linux-s390x.so .
          cd .. && tar -czvf tls-client-xgo-$VERSION-linux-s390x.so.tar.gz tls-client-xgo-$VERSION-linux-s390x.so
          
          cd cffi_dist && GOOS=linux GOARCH=ppc64le CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-linux-ppc64le.so .
          cd .. && tar -czvf tls-client-xgo-$VERSION-linux-ppc64le.so.tar.gz tls-client-xgo-$VERSION-linux-ppc64le.so
          
          cd cffi_dist && GOOS=linux GOARCH=riscv64 CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-linux-riscv64.so .
          cd .. && tar -czvf tls-client-xgo-$VERSION-linux-riscv64.so.tar.gz tls-client-xgo-$VERSION-linux-riscv64.so
          
          # macOS amd64 (via osxcross)
          cd cffi_dist && GOOS=darwin GOARCH=amd64 CC=o64-clang CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-darwin-amd64.dylib .
          cd .. && tar -czvf tls-client-xgo-$VERSION-darwin-amd64.dylib.tar.gz tls-client-xgo-$VERSION-darwin-amd64.dylib
          
          # macOS arm64 (via osxcross)
          cd cffi_dist && GOOS=darwin GOARCH=arm64 CC=oa64-clang CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-darwin-arm64.dylib .
          cd .. && tar -czvf tls-client-xgo-$VERSION-darwin-arm64.dylib.tar.gz tls-client-xgo-$VERSION-darwin-arm64.dylib
          
          # Windows (cross-compiler)
          cd cffi_dist && GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-windows-amd64.dll .
          cd .. && tar -czvf tls-client-xgo-$VERSION-windows-amd64.dll.tar.gz tls-client-xgo-$VERSION-windows-amd64.dll
          
          cd cffi_dist && GOOS=windows GOARCH=386 CC=i686-w64-mingw32-gcc CGO_ENABLED=1 go build -buildmode=c-shared -buildvcs=false -o ../tls-client-xgo-$VERSION-windows-386.dll .
          cd .. && tar -czvf tls-client-xgo-$VERSION-windows-386.dll.tar.gz tls-client-xgo-$VERSION-windows-386.dll

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            tls-client-linux-ubuntu-amd64-*.so.tar.gz
            tls-client-linux-alpine-amd64-*.so.tar.gz
            tls-client-linux-arm64-*.so.tar.gz
            tls-client-linux-armv7-*.so.tar.gz
            tls-client-darwin-*.dylib.tar.gz
            tls-client-windows-*.dll.tar.gz
            tls-client-xgo-*.so.tar.gz
            tls-client-xgo-*.dylib.tar.gz
            tls-client-xgo-*.dll.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}